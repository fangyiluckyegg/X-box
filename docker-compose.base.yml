#version: "3.8"
# 公共常驻服务：Nginx网关、MySQL8、Redis5
services:
  nginx-gateway:
    image: nginx:1.25-alpine
    container_name: dev-nginx-gateway
    mem_limit: 256m
    cpus: 0.5
    restart: always    
    security_opt:
      - no-new-privileges:true
    pids_limit: 50
    volumes:
      - ./gateway/nginx/conf.d:/etc/nginx/conf.d
      - ./gateway/nginx/ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    networks:
      - dev-network

  mysql:
    env_file:
      - .env.dev
    image: mysql:8.0
    container_name: dev-mysql
    mem_limit: 1g
    cpus: 1
    restart: always
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    volumes:
      # [C17] MySQL 数据目录改用命名卷（mysql_data），避免 bind 挂载到 Windows NTFS（大小写不敏感）
      # 导致 MySQL 8.0 全新初始化时 redo 日志创建失败（Cannot create redo log files ... corrupt）。
      # 命名卷位于 Docker Desktop Linux 虚拟机 ext4（大小写敏感），可正常建库；init.sql 仍由 mysql_init 挂载自动执行。
      - mysql_data:/var/lib/mysql
      - ./db/mysql_init:/docker-entrypoint-initdb.d
      # [C1] 挂载幂等补列包装脚本目录（刻意不进入 initdb.d，避免首次初始化被官方 entrypoint 误执行）
      - ./db/mysql_scripts:/mysql_scripts
      - ./logs/mysql:/var/log/mysql
    environment:
      TZ: Asia/Shanghai
      MYSQL_DATABASE: prj_dev
    ports:
      - "127.0.0.1:33060:3306"
    networks:
      - dev-network
    # [C1] 存量库漏列修复：用包装脚本替换官方 entrypoint，使每次启动（含存量 volume 不清）都幂等补 user_info.role 列。
    # 官方 docker-entrypoint.sh 仍由包装脚本后台调用，首次初始化 / 优雅关闭等官方行为保持不变；
    # compose 的 command（mysqld 参数）会作为 $@ 透传给包装脚本、再透传给官方 entrypoint。
    entrypoint:
      - /bin/bash
      - /mysql_scripts/docker-entrypoint-wrapper.sh
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:5.0.14-alpine
    container_name: dev-redis
    mem_limit: 512m
    cpus: 0.3
    restart: always
    security_opt:
      - no-new-privileges:true
    pids_limit: 100
    volumes:
      - ./db/redis_data:/data
      - ./logs/redis:/var/log/redis
    # [P0-FIX] Redis添加认证密码，防止未授权访问
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_default_pass_change_me} --dbfilename dump.rdb --appendonly no
    ports:
      - "127.0.0.1:63790:6379"
    networks:
      - dev-network

  # [C14] AI 服务名全局统一为 dev-prj-llama（消除 llama / dev-prj-llama 漂移）
  dev-prj-llama:
    build:
      context: ./
      dockerfile: ./ai_llama/Dockerfile.llama
    container_name: dev-prj-llama
    mem_limit: 4g
    cpus: 2
    security_opt:
      - no-new-privileges:true
    pids_limit: 100
    # Ollama TUI工具需要终端设备，修复 /dev/tty 报错
    stdin_open: true
    tty: true
    volumes:
      - ./logs/llama:/app/logs/llama
    environment:
      MODEL_ROOT_PATH: /model
      TZ: Asia/Shanghai
      OLLAMA_HOST: 0.0.0.0:11434
      # [C15] 与后端 CompareController 写死的模型名保持一致；
      # 单一来源，日后改模型名只改此处即可（包装脚本会读取 OLLAMA_MODEL 作为 MODEL_NAME 兜底）。
      OLLAMA_MODEL: bge-m3:latest
    ports:
      - "127.0.0.1:11434:11434"
    # [C15] 用包装脚本替换裸 `ollama serve`：启动时幂等拉取业务模型，
    # 消除"容器在跑但模型未拉取导致 /api/embeddings 404"的运行时故障。
    entrypoint: ["/bin/sh", "/app/docker-entrypoint-llama.sh"]
    # [C15] 健康检查：模型已拉取（或已标记不可用降级）即视为 healthy，
    # 放行依赖它的后端启动，实现 up 完即可对比，无需手动 pull。
    healthcheck:
      test: ["CMD-SHELL", "if [ -f /tmp/ollama-model-unavailable ]; then exit 0; fi; OLLAMA_HOST=127.0.0.1:11434 ollama list 2>/dev/null | grep -q 'bge-m3:latest'"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 180s
    networks:
      - dev-network


# 统一容器内网网络
networks:
  dev-network:
    driver: bridge

# [C17] 命名卷声明：MySQL 数据目录（避免 NTFS 大小写不敏感导致的 redo 日志初始化失败）
volumes:
  mysql_data:
