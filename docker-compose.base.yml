  # 宿主侧需先启动 Ollama 并 ollama pull bge-m3（见 scripts/setup-host-ollama.*）。
  # host.docker.internal 在多数 Docker 环境内置解析，但部分环境（如某些 Windows Docker 版本）不会注入，故在 prj-backend-c 显式用 extra_hosts 兜底。
