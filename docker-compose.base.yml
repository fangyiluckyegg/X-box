#version: "3.8"
# 公共常驻服务：Nginx网关、MySQL8、Redis5
services:
  nginx-gateway:
    image: nginx:1.25-alpine
    container_name: dev-nginx-gateway
    mem_limit: 256m
    cpus: 0.5
    restart: always    
    security_opt:
      - no-new-privileges:true
    pids_limit: 50
    volumes:
      - ./gateway/nginx/conf.d:/etc/nginx/conf.d
      - ./gateway/nginx/ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    networks:
      - dev-network

  mysql:
    env_file:
      - .env.dev
    image: mysql:8.0
    container_name: dev-mysql
    mem_limit: 1g
    cpus: 1
    restart: always
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    volumes:
      - ./db/mysql_data:/var/lib/mysql
      - ./db/mysql_init:/docker-entrypoint-initdb.d
      - ./logs/mysql:/var/log/mysql
    environment:
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:33060:3306"
    networks:
      - dev-network
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:5.0.14-alpine
    container_name: dev-redis
    mem_limit: 512m
    cpus: 0.3
    restart: always
    security_opt:
      - no-new-privileges:true
    pids_limit: 100
    volumes:
      - ./db/redis_data:/data
      - ./logs/redis:/var/log/redis
    # [P0-FIX] Redis添加认证密码，防止未授权访问
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_default_pass_change_me} --dbfilename dump.rdb --appendonly no
    ports:
      - "127.0.0.1:63790:6379"
    networks:
      - dev-network

  llama:
    build:
      context: ./
      dockerfile: ./ai_llama/Dockerfile.llama
    container_name: dev-prj-llama
    mem_limit: 6g
    cpus: 2
    security_opt:
      - no-new-privileges:true
    pids_limit: 100
    # Ollama TUI工具需要终端设备，修复 /dev/tty 报错
    stdin_open: true
    tty: true
    volumes:
      # Ollama官方模型持久化目录
      - ./ai_llama:/root/.ollama
      - ./logs/llama:/app/logs/llama
    environment:
      MODEL_ROOT_PATH: /model
      TZ: Asia/Shanghai
      OLLAMA_HOST: 0.0.0.0
    ports:
      - "127.0.0.1:11434:11434"
    entrypoint: ["/bin/sh", "-c"]
    command: >
      ollama serve &
      until ollama list; do sleep 1; done;
      ollama pull bge-m3:latest;
      wait
    networks:
      - dev-network


# 统一容器内网网络
networks:
  dev-network:
    driver: bridge