#version: "3.8"
# 公共常驻服务：Nginx网关、MySQL8、Redis5
services:
  nginx-gateway:
    image: nginx:1.25-alpine
    container_name: dev-nginx-gateway
    mem_limit: 256m
    cpus: 0.5
    restart: always    
    security_opt:
      - no-new-privileges:true
    pids_limit: 50
    volumes:
      - ./gateway/nginx/conf.d:/etc/nginx/conf.d
      - ./gateway/nginx/ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    networks:
      - dev-network

  mysql:
    env_file:
      - .env.dev
    image: mysql:8.0
    container_name: dev-mysql
    # [T5] CA 自签证书告警（MY-010068）：dev 环境使用 MySQL 自动生成的自签 ca.pem，
    # 属预期行为，无需修复；如需生产级 TLS 应挂载自定义证书并配置 ssl-* 变量。
    mem_limit: 1g
    cpus: 1
    restart: always
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    # 【方案A·2026-07-20】移除无效的 class_init 子目录挂载（原行：
    #   - ./db/class_init:/docker-entrypoint-initdb.d/class_init:ro）。
    # 原因：MySQL 官方 entrypoint 对 /docker-entrypoint-initdb.d/* 仅做【非递归】通配，
    #       子目录 class_init/ 内的 .sql 会被 "ignoring" 分支跳过，永不自动执行（QA 已确认）。
    # 真修复：db/class_init/msg.sql、work.sql 已并入 db/mysql_init/ 顶层（见下方挂载），
    #       全新数据卷首次初始化即自动建 msg/work 库；已存在数据卷(mysql_data)不会重跑，对运行时无影响。
    # 原 db/class_init/ 目录已删除，避免与 mysql_init 顶层重复造成混淆。
    volumes:
      # [C17] MySQL 数据目录改用命名卷（mysql_data），避免 bind 挂载到 Windows NTFS（大小写不敏感）
      # 导致 MySQL 8.0 全新初始化时 redo 日志创建失败（Cannot create redo log files ... corrupt）。
      # 命名卷位于 Docker Desktop Linux 虚拟机 ext4（大小写敏感），可正常建库；init.sql 仍由 mysql_init 挂载自动执行。
      - mysql_data:/var/lib/mysql
      - ./db/mysql_init:/docker-entrypoint-initdb.d
      # 【方案A·2026-07-20】已移除 class_init 只读子目录挂载（死挂载，见上方说明）；
      # msg/work SQL 现已并入 db/mysql_init/ 顶层，全新数据卷首次初始化即自动执行。
      # [C1] 挂载幂等补列包装脚本目录（刻意不进入 initdb.d，避免首次初始化被官方 entrypoint 误执行）
      - ./db/mysql_scripts:/mysql_scripts
      - ./logs/mysql:/var/log/mysql
    environment:
      TZ: Asia/Shanghai
      MYSQL_DATABASE: prj_dev
      # [T10-class] 透传班级网站账号口令给 wrapper（ensure_class_user 使用），
      # 与 prj-php 服务一致从 .env 注入；env_file(.env.dev) 已含 CLASS_DB_PWD，
      # 此处显式声明确保该变量到达 mysql 容器，使 ALTER class_user 生效。
      CLASS_DB_PWD: ${CLASS_DB_PWD}
    ports:
      - "127.0.0.1:33060:3306"
    networks:
      - dev-network
    # [C1] 存量库漏列修复：用包装脚本替换官方 entrypoint，使每次启动（含存量 volume 不清）都幂等补 user_info.role 列。
    # 官方 docker-entrypoint.sh 仍由包装脚本后台调用，首次初始化 / 优雅关闭等官方行为保持不变；
    # compose 的 command（mysqld 参数）会作为 $@ 透传给包装脚本、再透传给官方 entrypoint。
    entrypoint:
      - /bin/bash
      - /mysql_scripts/docker-entrypoint-wrapper.sh
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      # [T3] 尝试抑制 --skip-host-cache 弃用告警（MY-011068）：官方 entrypoint 仍会硬编码追加
      # --skip-host-cache，故该 warning 大概率仍出现，属官方镜像已知无害行为，建议忽略，
      # 不必为消除它改动 wrapper 调用官方 entrypoint 的核心逻辑。
      - --host-cache-size=0
      # [T4] 将 pid 文件落到数据目录（mysql 用户可写），消除 --pid-file 不安全路径告警（MY-011810）。
      - --pid-file=/var/lib/mysql/mysql.pid

  redis:
    # [对齐·2026-07-20] 由 redis:5.0.14-alpine 升级到 redis:7-alpine：
    # redis 5 官方镜像缺少 linux/arm64 清单，Mac(M2/OrbStack) 拉取会失败；
    # redis:7-alpine 为多架构镜像（amd64/arm64 均可用），对 dev(Windows/amd64) 向后兼容。
    image: redis:7-alpine
    container_name: dev-redis
    mem_limit: 512m
    cpus: 0.3
    restart: always
    security_opt:
      - no-new-privileges:true
    pids_limit: 100
    # [T6] 原通过 sysctls 关闭 THP（透明大页）以消除 Redis THP 警告的方案已移除：
    # Docker Desktop on Windows（WSL2 后端）不支持 kernel.mm.transparent_hugepage.enabled（不在独立 kernel namespace），
    # 曾导致容器创建失败（OCI runtime create failed: sysctl ... is not in a separate kernel namespace）。
    # 若想消除该无害的 THP 警告，请在宿主机（WSL2 终端，以 root）执行：
    #   echo never > /sys/kernel/mm/transparent_hugepage/enabled
    # 并写入 /etc/rc.local（或等价开机脚本）持久化，然后 docker compose restart redis。
    # 切勿为消除此无害警告而改用 privileged: true（会削弱容器隔离）。
    volumes:
      - ./db/redis_data:/data
      - ./logs/redis:/var/log/redis
    # [P0-FIX] Redis添加认证密码，防止未授权访问
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_default_pass_change_me} --dbfilename dump.rdb --appendonly no
    ports:
      - "127.0.0.1:63790:6379"
    networks:
      - dev-network

  # ============================================================
  # [Ollama 宿主原生迁移 2026-07-16] 容器版 dev-prj-llama 已彻底移除。
  # 后端（prj-backend-c）改用宿主原生 Ollama：
  #   AI_SERVICE_URL=http://host.docker.internal:11434
  # 宿主侧需先启动 Ollama 并 ollama pull bge-m3（见 scripts/setup-host-ollama.*）。
  # host.docker.internal 在多数 Docker 环境内置解析，但部分环境（如某些 Windows Docker 版本）不会注入，故在 prj-backend-c 显式用 extra_hosts 兜底。
  # ------------------------------------------------------------
  # 【清理·2026-07-20】移除「容器版 Ollama」注释回退示例：Ollama 已迁宿主机原生部署，
  # 对应构建文件随目录于本日删除，故不再保留该注释服务块（避免指向已删除的构建上下文）。


# 统一容器内网网络
networks:
  dev-network:
    driver: bridge

# [C17] 命名卷声明：MySQL 数据目录（避免 NTFS 大小写不敏感导致的 redo 日志初始化失败）
volumes:
  mysql_data:
