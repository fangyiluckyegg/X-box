# frpc.class-http.example.toml
# ============================================================
# 班级网站穿透示例（仅参考片段，非完整 frpc.toml）
# 使用方式：将下方 [class-http] 段复制进 Mac 上的 frpc.toml，
#           替换原先指向宿主机 Apache :8080 的条目（见《X-box-Niu_Txl整合设计.md》§5.7）
# TLS 在 VPS frps 终止；此处仅做本地 loopback 反代（127.0.0.1:1181 → prj-php）
# 生效：launchctl kickstart -k gui/$UID/<frpc-plist-label>
# ============================================================

[[proxies]]
name = "class-http"
type = "http"
localIP = "127.0.0.1"
localPort = 1181          # 指向 prj-php 容器发布端口（docker-compose.prod.yml）
customDomains = ["class.<你的域名>"]   # 改成实际域名，需 DNS A 记录指向 VPS
