# ============================================================
# 业务应用栈（DEV / 开发内网）
#
# ⚠️ 本文件是"开发/内网"编排，并非生产环境！文件名虽带 business-prj，但 SPRING_PROFILES_ACTIVE=dev。
#    真正的生产部署请使用：docker-compose.prod.yml（prod profile + 外部化密钥 + 无 dev- 前缀）。
#
# 运行方式（与 base 共用基础设施）：
#   docker compose -f docker-compose.base.yml -f docker-compose.business-prj.yml up -d
# ============================================================
services:
  prj-frontend:
    build:
        context: ./web/prj-frontend
        dockerfile: Dockerfile.dev
    #image: nginx:1.25-alpine
    container_name: dev-prj-frontend
    ports:
      - "8081:8081"
    mem_limit: 512m
    cpus: 0.5
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    volumes:
      #- ./web/prj-frontend/dist:/usr/share/nginx/html
      - ./logs/prj-frontend:/var/log/nginx
    depends_on:
      - nginx-gateway
    networks:
      - dev-network

  prj-backend-c:
    build:
      context: .
      dockerfile: ./backend/prj-backend-c/Dockerfile.dev
    container_name: dev-prj-backend-c
    mem_limit: 2g
    cpus: 2
    restart: no
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    volumes:
      - ./logs/prj-backend-c:/app/logs
      - prj-maven-cache:/root/.m2
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: dev
      # 数据库配置
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/prj_dev?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      # Redis配置
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_DATABASE: 9
      # [P0-FIX] Redis认证密码，与Redis容器requirepass保持一致
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_default_pass_change_me}
      # AI向量服务地址【给Java用的】
      # [Ollama 宿主原生迁移 2026-07-16] 后端经宿主原生 Ollama 访问
      # （显式 extra_hosts 兜底，避免部分 Docker 环境不注入该 DNS）
      AI_SERVICE_URL: http://host.docker.internal:11434
    # [FIX] 显式 extra_hosts 兜底，避免部分 Docker 环境不注入 host.docker.internal 的 DNS 解析
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mysql
      - redis
    networks:
      - dev-network

  # [Ollama 宿主原生迁移 2026-07-16] 删除原重复的 dev-prj-llama 服务块（R-05 遗留）。
  # 后端改用宿主原生 Ollama：AI_SERVICE_URL=http://host.docker.internal:11434。
  # 如需回退到容器 Ollama，见 docker-compose.base.yml 末尾注释块。

# 统一容器内网网络
networks:
  dev-network:
    driver: bridge

# Maven依赖缓存卷（避免每次重启重新下载）
volumes:
  prj-maven-cache:
