# ============================================================
# 业务应用栈（DEV / 开发内网）
#
# ⚠️ 本文件是"开发/内网"编排，并非生产环境！文件名虽带 business-prj，但 SPRING_PROFILES_ACTIVE=dev。
#    真正的生产部署请使用：docker-compose.prod.yml（prod profile + 外部化密钥 + 无 dev- 前缀）。
#
# 运行方式（与 base 共用基础设施）：
#   docker compose -f docker-compose.base.yml -f docker-compose.business-prj.yml up -d
# ============================================================
services:
  prj-frontend:
    build:
        context: ./web/prj-frontend
        dockerfile: Dockerfile.dev
    #image: nginx:1.25-alpine
    container_name: dev-prj-frontend
    ports:
      - "8081:8081"
    mem_limit: 512m
    cpus: 0.5
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    volumes:
      #- ./web/prj-frontend/dist:/usr/share/nginx/html
      - ./logs/prj-frontend:/var/log/nginx
    depends_on:
      - nginx-gateway
    networks:
      - dev-network

  prj-backend-c:
    build:
      context: .
      dockerfile: ./backend/prj-backend-c/Dockerfile.dev
    container_name: dev-prj-backend-c
    mem_limit: 2g
    cpus: 2
    restart: no
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    volumes:
      - ./logs/prj-backend-c:/app/logs
      - prj-maven-cache:/root/.m2
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: dev
      # 数据库配置
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/prj_dev?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      # Redis配置
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_DATABASE: 9
      # [P0-FIX] Redis认证密码，与Redis容器requirepass保持一致
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_default_pass_change_me}
      # AI向量服务地址【给Java用的】
      # [C14] AI 服务名全局统一为 dev-prj-llama（消除 llama / dev-prj-llama 漂移）
      AI_SERVICE_URL: http://dev-prj-llama:11434
    depends_on:
      - mysql
      - redis
      - dev-prj-llama
    networks:
      - dev-network

  # [C14] AI 服务名全局统一为 dev-prj-llama（消除 llama / dev-prj-llama 漂移）
  dev-prj-llama:
    build:
      context: ./
      dockerfile: ./ai_llama/Dockerfile.llama
    container_name: dev-prj-llama
    mem_limit: 6g
    cpus: 2
    security_opt:
      - no-new-privileges:true
    pids_limit: 100
    volumes:
      #- ./ai_llama:/model
      - ./logs/llama:/app/logs
    environment:
      MODEL_ROOT_PATH: /model
      TZ: Asia/Shanghai
      OLLAMA_HOST: 0.0.0.0:11434  # 允许外部容器访问（ollama 0.1.17 使用 host:port 格式）
    ports:
      - "127.0.0.1:11434:11434" # 暴露ollama标准端口【给Python用的，仅绑定回环地址防未授权访问】
    # [C15] 改用包装脚本替换裸 ollama serve：运行时幂等检查业务模型（镜像已含则跳过 pull，
    # 命中即秒级就绪；未烘焙/切换 OLLAMA_MODEL 时自动拉取，避免 /api/embeddings 404）。
    entrypoint: ["/bin/sh", "/app/docker-entrypoint-llama.sh"]

    networks:
      - dev-network

# 统一容器内网网络
networks:
  dev-network:
    driver: bridge

# Maven依赖缓存卷（避免每次重启重新下载）
volumes:
  prj-maven-cache:
