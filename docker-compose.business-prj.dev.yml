# 开发环境业务编排（frontend + backend-c + PHP/Niu_Txl）
# 与 docker-compose.base.yml 共用 dev-mysql / dev-redis / dev-network 等基础设施；
# 开发阶段无需触碰 prod 文件（docker-compose.prod.yml）。
# 启动（合并 classphp.dev 后仅 2 文件，对齐 prod 形态）：
#   docker compose -f docker-compose.base.yml -f docker-compose.business-prj.dev.yml --env-file .env.dev up -d --build
services:
  # [CSP·2026-07-22] dev 端 nginx-gateway 覆盖：单文件挂载 prj.dev.conf（subdir 内）覆盖
  # base 共享的 prj.conf。dev/prj.conf 仅在 script-src 增 'unsafe-eval'，放行 vue-cli HMR
  # 的 eval()（chunk-vendors.js:4840 报 EvalError 的根因）。prod 端继续用原 strict CSP。
  # 完整列基 volumes（不依赖 compose 隐式合并行为），最后一行是 dev 专用覆盖。
  nginx-gateway:
    volumes:
      - ./gateway/nginx/conf.d:/etc/nginx/conf.d
      - ./gateway/nginx/ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
      - ./gateway/nginx/conf.d/dev/prj.conf:/etc/nginx/conf.d/prj.conf:ro

  prj-frontend:
    build:
      context: ./web/prj-frontend
      dockerfile: Dockerfile.dev
    container_name: dev-prj-frontend
    ports:
      - "8081:8081"
    mem_limit: 1g
    cpus: 0.5
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    stdin_open: true
    tty: true # VSCode终端交互必需
    volumes:
      # ① 全局挂载项目根目录到 /workspace，和后端统一路径，VSCode可直接加载全部源码
      - ./:/workspace:cached
      # ② 单独挂载前端源码目录到/app，供容器内部npm运行
      - ./web/prj-frontend:/app:cached
      # 隔离node_modules，不覆盖本地
      - node_modules_volume:/app/node_modules
      # [LOG·2026-07-22] 前端 dev 日志：vue-cli-service serve 的 stdout 经 package.json 的 dev script 用 tee
      # 写到 /workspace/logs/prj-frontend/dev.log（借整目录 mount 的 /workspace 路径直达宿主机 logs/）。
      # 旧挂载 ./logs/prj-frontend:/app/logs/prj-frontend 被 /app:cached 整目录 mount 接管，是死挂载，删除。
    networks:
      - dev-network
    # [T1] 等后端真正就绪（healthcheck 通过）再启动，而非仅容器 started，
    # 消除 frontend 先于 backend ready 启动导致的代理 ECONNREFUSED 瞬时报错。
    depends_on:
      prj-backend-c:
        condition: service_healthy

  prj-backend-c:
    # [C4] 后端仅从 .env.backend 读取所需变量（不含任何 ROOT 口令），不再共享含根口令的 .env.dev
    env_file:
      - .env.backend
    build:
      context: .
      dockerfile: ./backend/prj-backend-c/Dockerfile.dev
    container_name: dev-prj-backend-c
    mem_limit: 2g
    cpus: 2
    restart: "no"
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    working_dir: /workspace/backend/prj-backend-c
    # 修复 TTY /dev/tty 缺失报错（VSCode DevContainer 必须）
    stdin_open: true
    tty: true
    # 覆盖默认启动命令，开发环境直接maven启动源码，不依赖jar包
    #command: ["mvn", "spring-boot:run"]

    volumes:
      # 全项目挂载，适配DevContainer /workspace
      - ./:/workspace:cached
      # Maven缓存卷，避免重复下载依赖
      - maven-cache:/root/.m2
      - ./logs/prj-backend-c:/app/logs
    # [T7] 弱凭证告警说明（Spring Boot StartupSecurityValidator）：
    # 下方 REDIS_PASSWORD（及 DRUID_PASSWORD 等）为 dev 环境默认弱口令，仅在 [dev] 环境允许，属预期行为。
    # 生产环境请务必通过环境变量覆盖 REDIS_PASSWORD / DRUID_PASSWORD 为强口令（如经 .env.backend 注入），切勿沿用默认值。
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: dev
      # [BUGFIX] dev 端开启 springdoc swagger-ui（application.yml 默认 ${SWAGGER_ENABLED:false}）
      # prod 端通过 .env.prod.backend 显式 SWAGGER_ENABLED=false 保持关闭（安全）
      SWAGGER_ENABLED: "true"
      # [FIX] 移除 JAVA_TOOL_OPTIONS JDWP 调试代理 — spring-boot:run 会 fork 第二个 JVM，
      # 两个 JVM 都会拾取 JAVA_TOOL_OPTIONS 并尝试绑定同一 5005 端口，导致 "Address in use" 崩溃。
      # 如需远程调试，请改用 -Dspring-boot.run.jvmArguments 传参（仅作用于 forked JVM）。
      # JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/prj_dev?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      # [P1-UPGRADE] Spring Boot 3 / Spring Data Redis 3：redis 配置前缀由 spring.redis.* 改为 spring.data.redis.*
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_DATABASE: 9
      # [P0-FIX] Redis认证密码，与Redis容器requirepass保持一致（对应 spring.data.redis.password）
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_default_pass_change_me}
      # [Ollama 宿主原生迁移 2026-07-16] 后端经宿主原生 Ollama 访问
      # （显式 extra_hosts 兜底，避免部分 Docker 环境不注入该 DNS）
      AI_SERVICE_URL: http://host.docker.internal:11434
    # [FIX] 显式 extra_hosts 兜底，避免部分 Docker 环境不注入 host.docker.internal 的 DNS 解析
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    # [T1] 健康检查：验证 Spring Boot 已就绪（/captchaImage 端点，与 Dockerfile.dev 一致），
    # 供下方 prj-frontend 的 depends_on: service_healthy 等待，消除启动期代理 ECONNREFUSED。
    # 参数对齐 Dockerfile.dev：interval=30s timeout=5s start-period=120s retries=3。
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/captchaImage"]
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 3
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - dev-network

  # [PHP/Niu_Txl] 由 docker-compose.classphp.dev.yml 合并而来（2026-07-20）
  prj-php:
    build:
      context: ./Niu_Txl
      dockerfile: Dockerfile.classphp
    container_name: dev-prj-php
    restart: "no"
    security_opt:
      - no-new-privileges:true
    pids_limit: 100
    mem_limit: 512m
    cpus: 1.0
    env_file:
      - .env.dev          # 注入 CLASS_DB_* 到容器，conn.php 经 getenv 读取
    volumes:
      - ./Niu_Txl:/var/www/html
      - ./logs/prj-php:/var/log/apache2
    environment:
      CLASS_DB_HOST: mysql        # dev 永远连 base 的 mysql 服务
      TZ: Asia/Shanghai
    # Layer 2 永久修复：apache 启动前先确保 admin_user 为 bcrypt hash（详见 Niu_Txl/ensure_admin_hash.php）
    command: ["sh","-c","php /var/www/html/ensure_admin_hash.php && exec docker-php-entrypoint apache2-foreground"]
    ports:
      - "127.0.0.1:1181:80"       # 与 prod 端口一致，避免改 nginx upstream
    depends_on:
      mysql:
        condition: service_started
    networks:
      - dev-network

# 开发内网桥接网络
networks:
  dev-network:
    driver: bridge

# Maven持久化缓存卷，加速编译
volumes:
  maven-cache:
  # 文件末尾新增命名卷
  node_modules_volume:
