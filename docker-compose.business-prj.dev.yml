services:
  prj-frontend:
    build:
      context: ./web/prj-frontend
      dockerfile: Dockerfile.dev
    container_name: dev-prj-frontend
    ports:
      - "8081:8081"
    mem_limit: 1g
    cpus: 0.5
    stdin_open: true
    tty: true # VSCode终端交互必需
    command: sleep infinity # 容器常驻，不会启动后立刻退出
    volumes:
      # ① 全局挂载项目根目录到 /workspace，和后端统一路径，VSCode可直接加载全部源码
      - ./:/workspace:cached
      # ② 单独挂载前端源码目录到/app，供容器内部npm运行
      - ./web/prj-frontend:/app:cached
      # 隔离node_modules，不覆盖本地
      - node_modules_volume:/app/node_modules
      - ./logs/prj-frontend:/var/log/nginx
    networks:
      - dev-network

  prj-backend-c:
    env_file:
      - .env.dev
    build:
      context: .
      dockerfile: ./backend/prj-backend-c/Dockerfile.dev
    container_name: dev-prj-backend-c
    mem_limit: 2g
    cpus: 2
    restart: "no"
    working_dir: /workspace/backend/prj-backend-c
    # 修复 TTY /dev/tty 缺失报错（VSCode DevContainer 必须）
    stdin_open: true
    tty: true
    # 覆盖默认启动命令，开发环境直接maven启动源码，不依赖jar包
    #command: ["mvn", "spring-boot:run"]

    volumes:
      # 全项目挂载，适配DevContainer /workspace
      - ./:/workspace:cached
      # Maven缓存卷，避免重复下载依赖
      - maven-cache:/root/.m2
      - ./logs/prj-backend-c:/app/logs
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: dev
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/prj_dev?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_DATABASE: 9
      AI_SERVICE_URL: http://llama:8000
    ports:
      - "8080:8080"
      - "5005:5005"
    depends_on:
      - mysql
      - redis
      - llama
    networks:
      - dev-network

  llama:
    build:
      context: ./
      dockerfile: ./ai_llama/Dockerfile.llama
    container_name: dev-prj-llama
    mem_limit: 6g
    cpus: 2
    # Ollama TUI工具需要终端设备，修复 /dev/tty 报错
    stdin_open: true
    tty: true
    volumes:
      # Ollama官方模型持久化目录
      - ./ai_llama:/root/.ollama
      - ./logs/llama:/app/logs
    environment:
      MODEL_ROOT_PATH: /model
      TZ: Asia/Shanghai
      OLLAMA_HOST: 0.0.0.0
    ports:
      - "8000:8000"
      - "11434:11434"
    entrypoint: ["/bin/sh", "-c"]
    command: >
      ollama serve &
      until ollama list; do sleep 1; done;
      ollama pull bge-m3:latest;
      wait
    networks:
      - dev-network

# 开发内网桥接网络
networks:
  dev-network:
    driver: bridge

# Maven持久化缓存卷，加速编译
volumes:
  maven-cache:
  # 文件末尾新增命名卷
  node_modules_volume:
