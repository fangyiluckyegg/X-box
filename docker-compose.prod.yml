# ============================================================
# 生产环境编排（C5 / C14）—— Apple Silicon (Mac mini M2) 适配版
#
# ⬇⬇⬇ 本次「dev→prod 对齐 + bug 排查 + 整合精简」（2026-07-20）相对上一版的关键修正 ⬇⬇⬇
#   1. 【端口冲突修复·高】原 prj-nginx 与 base 的 nginx-gateway 同时绑定 127.0.0.1:80/443，
#      合并运行必冲突（仅一个能起）。现移除 prj-nginx，统一复用 base 的 nginx-gateway
#      （同一份 gateway/nginx/conf.d/prj.conf，TLS/资源限制完全一致）。
#   2. 【端口冲突修复·高】原 prj-redis 与 base 的 redis 同时绑定 127.0.0.1:63790，冲突。
#      现保留 prod 自有 prj-redis（redis:7，arm64 兼容）但【移除其宿主机端口映射】，
#      仅容器内网可达（后端经服务名 prj-redis 访问），消除冲突与冗余暴露。
#   3. 【网络对齐·中】原 prod 业务服务挂在 isolated 的 prj-network，而网关在 dev-network，
#      导致前端仅 prj-network、网关无法代理前端。现全部 prod 业务服务统一挂 dev-network
#      （与 dev 一致），删除 prj-network。
#   4. 【前端端口对齐·低】prj-frontend 补回 127.0.0.1:8081:8081（与 dev 对齐，loopback）。
# ⬆⬆⬆ 以上修正已使 prod 与 dev 在「service 命名 / 网络 / 端口映射逻辑」上对齐 ⬆⬆⬆
#
# 其余既有约束保持不变：
#   - 后端使用 prod profile（SPRING_PROFILES_ACTIVE=prod），启用严格密钥校验
#   - 后端敏感凭证经 env_file (.env.prod.backend) 外部化；infra 变量经 --env-file .env.prod 插值
#   - 容器名去除 dev- 前缀；restart: unless-stopped；无 TTY / 不挂载源码
#   - AI 推理经宿主原生 Ollama（host.docker.internal:11434）
#
# 使用：
#   cp .env.prod .env.prod.local   # 填入真实强随机密钥后（不要提交 .env.prod 到 Git）
#   docker compose -f docker-compose.base.yml -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# ⚠️ 本生产栈【并非】自包含——必须与 docker-compose.base.yml 一同启动，
#   共享 base 的 nginx-gateway / dev-mysql / dev-redis（均在 dev-network）。
#   单跑本文件会因 dev-mysql / nginx-gateway 不存在而解析/连接失败。
#
# ⚠️【凭证契约 · 必须一致】共享 dev-mysql 中 prj_user 的口令由 base 的 .env.dev 的
#   SPRING_DATASOURCE_PASSWORD 在运行时注入（ensure_app_user()）。故 Mac 部署 prod 时，
#   本机 .env.dev 的 SPRING_DATASOURCE_PASSWORD 必须与 .env.prod.backend 的
#   SPRING_DATASOURCE_PASSWORD 完全相同，否则 prod 后端连不上 dev-mysql。
#   （当前 .env.dev 与 .env.prod.backend 该值已一致：<REDACTED-live-prod>）
#
# ⚠️ 拓扑：生产全栈复用 base 的 dev-mysql（容器名 dev-mysql，网络 dev-network）。
#   建库（prj_dev）、class_user 账号与授权、密码对齐见 docs 运行手册，由运维在 dev-mysql 运行时执行。
#   AI 推理自 2026-07-16 起迁至宿主原生 Ollama（host.docker.internal:11434），prod 不再 depends_on Ollama。
# ============================================================
services:
  # ------------------------------------------------------------
  # prod 自有 Redis（redis:7，arm64 兼容）。保留而非复用 base redis 的原因：
  # base redis 的 requirepass 取 .env.dev（dev 默认弱口令），而 prod 后端用 .env.prod 的强口令，
  # 二者口令不同，无法直接复用；为不改动 dev 配置，prod 用独立 prj-redis 并自带强口令。
  # 【已移除宿主机端口映射】避免与 base redis 的 63790 冲突；仅 dev-network 内可达。
  # ------------------------------------------------------------
  prj-redis:
    image: redis:7-alpine
    platform: linux/arm64
    container_name: prj-redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    pids_limit: 100
    mem_limit: 512m
    cpus: 0.5
    volumes:
      - ./db/redis_data:/data
      - ./logs/redis:/var/log/redis
    # 注意：${REDIS_PASSWORD} 由 compose 在解析时用 .env.prod 的值替换（单 $ 为 compose 插值）
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 384mb --maxmemory-policy allkeys-lru --dbfilename dump.rdb --appendonly no
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - dev-network

  # 凭证契约见文件头【凭证契约】段：后端用 .env.prod.backend 的 SPRING_DATASOURCE_PASSWORD
  # 连 dev-mysql 的 prj_user；该口令由 .env.dev 的 SPRING_DATASOURCE_PASSWORD 注入，
  # 两者必须一致（Mac 部署 prod 时务必对齐）。
  prj-backend-c:
    env_file: .env.prod.backend
    build:
      context: .
      dockerfile: ./backend/prj-backend-c/Dockerfile.prod
    platform: linux/arm64
    container_name: prj-backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    mem_limit: 2g
    cpus: 2.0
    environment:
      TZ: Asia/Shanghai
      # [C2] 生产启用 prod profile，触发严格密钥校验（弱/缺失即启动失败）
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://dev-mysql:3306/${MYSQL_DATABASE:-prj_dev}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATA_REDIS_HOST: prj-redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_DATABASE: 9
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      AI_SERVICE_URL: http://host.docker.internal:11434
    # [FIX] 显式 extra_hosts 兜底，避免部分 Docker 环境不注入 host.docker.internal 的 DNS 解析
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_started
      prj-redis:
        condition: service_healthy
    networks:
      - dev-network

  prj-frontend:
    build:
      context: ./web/prj-frontend
      dockerfile: Dockerfile.prod
    platform: linux/arm64
    container_name: prj-frontend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    mem_limit: 256m
    cpus: 0.5
    volumes:
      - ./logs/prj-frontend:/var/log/nginx
    # [对齐·2026-07-20] 与 dev 一致，loopback 暴露 8081（同时仍经 nginx-gateway:80 统一入口）
    ports:
      - "127.0.0.1:8081:8081"
    # 复用 base 的 nginx-gateway（已移除重复的 prj-nginx）
    depends_on:
      - nginx-gateway
    networks:
      - dev-network

  # ===== 班级网站 Niu_Txl（607/902）运行环境 =====
  # Apache + PHP 8.2 + mysqli + gd，bind mount ./Niu_Txl 为 docroot（/var/www/html），
  # 607/902 直接以 /607、/902 子路径对外；复用 dev-mysql 新建 msg/work 库与 class_user 账号。
  # 仅新增本服务，未改动其它任何服务。详见《X-box-Niu_Txl整合设计.md》
  prj-php:
    build:
      context: ./Niu_Txl
      dockerfile: Dockerfile.classphp
    image: prj-php:prod
    platform: linux/arm64
    container_name: prj-php
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    pids_limit: 100
    mem_limit: 512m
    cpus: 1.0
    volumes:
      - ./Niu_Txl:/var/www/html          # docroot = Niu_Txl，607/902 直接可用
      - ./logs/prj-php:/var/log/apache2
    environment:
      CLASS_DB_HOST: ${CLASS_DB_HOST:-dev-mysql}
      CLASS_DB_USER: ${CLASS_DB_USER:-class_user}
      CLASS_DB_PWD: ${CLASS_DB_PWD}
      # ⚠️ 不传 CLASS_DB_NAME：902/message 回退 'msg'，902/work 回退 'work'
      # 若全局传此变量会导致一个站点连错库（见偏差 J）
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:1181:80"            # loopback，仅供 frpc 指向（TLS 在 VPS frps 终止）
    depends_on:
      mysql:
        condition: service_started
    networks:
      - dev-network

# 说明：本文件不再定义 prj-network。prod 业务服务统一挂 base 定义的 dev-network，
#       与 dev 拓扑一致，且可与 base 的 nginx-gateway / dev-mysql 互通。
