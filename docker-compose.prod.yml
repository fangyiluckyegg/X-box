# ============================================================
# 生产环境编排（C5 / C14）—— Apple Silicon (Mac mini) 适配版
#
# 特点：
#   - 后端使用 prod profile（SPRING_PROFILES_ACTIVE=prod），启用严格密钥校验
#   - 所有敏感凭证经 env_file (.env.prod) 外部化，禁止明文进仓库
#   - 容器名去除 dev- 前缀；restart: unless-stopped；无 TTY / 不挂载源码
#   - AI 推理改由宿主原生 Ollama 提供（host.docker.internal:11434，base 已移除容器 llama）
#
# 本次 Apple Silicon 适配改动（相对原 prod）：
#   - redis 5.0.14-alpine -> redis:7-alpine（Redis 5 已 EOL，官方 arm64 镜像缺失，Mac 上会拉取失败）
#   - 所有服务显式 platform: linux/arm64（避免 amd64 模拟退化，保证原生性能）
#   - 补充 mem_limit / cpus 资源限制（防止 Mac 内存被单容器吃满）
#   - mysql / redis 增加健康检查；后端 depends_on 等待二者 healthy 再启动
#   - 网关 X-Forwarded-For 已改为覆盖式（见 gateway/nginx/conf.d/prj.conf），防客户端伪造 IP
#
# 使用：
#   cp .env.prod .env.prod.local  # 填入真实强随机密钥后（不要提交 .env.prod 到 Git）
#   docker compose -f docker-compose.base.yml -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# 说明：本生产栈【并非】自包含独立栈——它必须与 docker-compose.base.yml 一同启动，
#       共享 base.yml 的 dev-mysql（数据库）；AI 推理（Ollama + bge-m3）自 2026-07-16 起
#       改为【宿主原生部署】，后端经 host.docker.internal:11434 访问（base 已移除容器 llama）。
#       为避免 dev- 前缀基础设施被重复创建，请勿单独运行本文件。
#
# ⚠️【凭证契约 · 必须一致】共享 dev-mysql 中 prj_user 的口令由 MySQL 容器 env
#   （base.yml 的 .env.dev）的 SPRING_DATASOURCE_PASSWORD 在运行时注入
#   （见 db/mysql_scripts/docker-entrypoint-wrapper.sh 的 ensure_app_user()）。
#   故：Mac 部署 prod 时，本机 .env.dev 的 SPRING_DATASOURCE_PASSWORD
#   必须与下方本文件引用的 .env.prod 的 SPRING_DATASOURCE_PASSWORD 完全相同，
#   否则 prod 后端连不上 dev-mysql。
#
# ⚠️ 拓扑变更（2026-07-14）：原独立 prj-mysql 已废弃删除，生产全栈统一复用
#    docker-compose.base.yml 的 dev-mysql（容器名 dev-mysql，网络 dev-network）。
#    - 故本生产栈必须与 base.yml 一并启动（dev-mysql 为常驻依赖）：
#        docker compose -f docker-compose.base.yml -f docker-compose.prod.yml --env-file .env.prod up -d --build
#    - 单跑本文件会因 dev-mysql 不存在而解析/连接失败。
#    - prj-backend / prj-php 已加入 dev-network 以便跨网互访；dev-mysql 无 healthcheck，
#      depends_on 一律用 condition: service_started。
#    - 建库（prj_prod/msg/work）、class_user 账号与授权、密码对齐等操作见
#      docs/X-box-db-merge-runbook-2026-07-14.md，由运维在 dev-mysql 运行时执行。
#    - 本次合并同时移除 prod 自带的 `prj-llama`，并自 2026-07-16 起将 AI 推理迁至宿主原生 Ollama
#      （host.docker.internal:11434），base 的容器 `dev-prj-llama` 也已移除，prod.yml 不再 depends_on Ollama。
# ============================================================
services:
  prj-nginx:
    image: nginx:1.25-alpine
    platform: linux/arm64
    container_name: prj-nginx
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    pids_limit: 50
    mem_limit: 256m
    cpus: 0.5
    volumes:
      - ./gateway/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./gateway/nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    networks:
      - prj-network

  prj-redis:
    image: redis:7-alpine
    platform: linux/arm64
    container_name: prj-redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    pids_limit: 100
    mem_limit: 512m
    cpus: 0.5
    volumes:
      - ./db/redis_data:/data
      - ./logs/redis:/var/log/redis
    # 注意：${REDIS_PASSWORD} 由 compose 在解析时用 .env.prod 的值替换（单 $ 为 compose 插值）
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 384mb --maxmemory-policy allkeys-lru --dbfilename dump.rdb --appendonly no
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    ports:
      - "127.0.0.1:63790:6379"
    networks:
      - prj-network

  # 凭证契约见文件头【凭证契约】段：后端用 .env.prod 的 SPRING_DATASOURCE_PASSWORD
  # 连 dev-mysql 的 prj_user；该口令由 .env.dev 的 SPRING_DATASOURCE_PASSWORD 注入，
  # 两者必须一致（Mac 部署 prod 时务必对齐）。
  prj-backend-c:
    env_file: .env.prod
    build:
      context: .
      dockerfile: ./backend/prj-backend-c/Dockerfile.prod
    platform: linux/arm64
    container_name: prj-backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    mem_limit: 2g
    cpus: 2.0
    environment:
      TZ: Asia/Shanghai
      # [C2] 生产启用 prod profile，触发严格密钥校验（弱/缺失即启动失败）
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://dev-mysql:3306/${MYSQL_DATABASE:-prj_prod}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATA_REDIS_HOST: prj-redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_DATABASE: 9
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      AI_SERVICE_URL: http://host.docker.internal:11434
    # [FIX] 显式 extra_hosts 兜底，避免部分 Docker 环境不注入 host.docker.internal 的 DNS 解析
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_started
      prj-redis:
        condition: service_healthy
    networks:
      - prj-network
      - dev-network

  prj-frontend:
    build:
      context: ./web/prj-frontend
      dockerfile: Dockerfile.prod
    platform: linux/arm64
    container_name: prj-frontend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    mem_limit: 256m
    cpus: 0.5
    volumes:
      - ./logs/prj-frontend:/var/log/nginx
    depends_on:
      - prj-nginx
    networks:
      - prj-network

  # ===== 新增：班级网站 Niu_Txl（607/902）运行环境 =====
  # Apache + PHP 7.4 + mysqli + gd，bind mount ./Niu_Txl 为 docroot（/var/www/html），
  # 607/902 直接以 /607、/902 子路径对外；复用 dev-mysql 新建 msg/work 库与 class_user 账号。
  # 仅新增本服务，未改动其它任何服务。详见《X-box-Niu_Txl整合设计.md》。
  prj-php:
    build:
      context: ./Niu_Txl
      dockerfile: Dockerfile.classphp
    image: prj-php:prod
    platform: linux/arm64
    container_name: prj-php
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    pids_limit: 100
    mem_limit: 512m
    cpus: 1.0
    volumes:
      - ./Niu_Txl:/var/www/html          # docroot = Niu_Txl，607/902 直接可用
      - ./logs/prj-php:/var/log/apache2
    environment:
      CLASS_DB_HOST: ${CLASS_DB_HOST:-dev-mysql}
      CLASS_DB_USER: ${CLASS_DB_USER:-class_user}
      CLASS_DB_PWD: ${CLASS_DB_PWD}
      # ⚠️ 不传 CLASS_DB_NAME：902/message 回退 'msg'，902/work 回退 'work'
      # 若全局传此变量会导致一个站点连错库（见偏差 J）
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:1181:80"            # loopback，仅供 frpc 指向（TLS 在 VPS frps 终止）
    depends_on:
      mysql:
        condition: service_started
    networks:
      - prj-network
      - dev-network

networks:
  prj-network:
    driver: bridge
