# ============================================================
# 前端 Nginx 站点配置（web/prj-frontend/nginx.conf）
# 职责：作为 SPA 静态站点，将所有请求兜底到 index.html 以支持前端路由（history 模式）。
# 说明：监听 8081 端口；上方注释块为 80 端口的备选写法（未启用）。
# ============================================================

#server {
#    listen 80;
#    location / {
#        root /usr/share/nginx/html;
#        index index.html;
#        try_files $uri $uri/ /index.html;
#    }
#}


server {
    listen 8081;
    server_name _;
    root /usr/share/nginx/html;

    # Docker 内置 DNS，延迟解析，规避启动校验报错
    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 10s;

    # [LOG·2026-07-22] 显式声明日志路径：
    # nginx worker 以非 root 的 nginx 用户运行，bind 挂载的宿主机 ./logs/prj-frontend 目录
    # 默认属 root，nginx 用户写不进 → access.log / error.log 静默写不出。
    # 与 redis/mysql 同样改用【单文件 bind mount】(./logs/prj-frontend/access.log:/var/log/nginx/access.log 等)，
    # 让 nginx 把日志落到自己人可写的容器内路径，宿主侧通过单文件挂载同步落盘。
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # 登录、登出、验证码等直接转发到后端（避免前端静态路由拦截导致 403）
    location ~ ^/(login|logout|captchaImage) {
        set $backend_host prj-backend-c;
        proxy_pass http://$backend_host:8080;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        if ($request_method = 'OPTIONS') { return 204; }
    }

    # 后端根路径 allowlist：显式转发到后端，不改控制器、不改前端
    location ~ ^/(employee_kpi|compare|positionLearning|druid|v3|swagger-ui|doc.html|webjars|profile) {
        set $backend_host prj-backend-c;
        proxy_pass http://$backend_host:8080;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        if ($request_method = 'OPTIONS') { return 204; }
    }

    # 后端 API 接口路由
    location /api/ {
        set $backend_host prj-backend-c;
        proxy_pass http://$backend_host:8080;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        if ($request_method = 'OPTIONS') { return 204; }
    }

    # SPA history 路由兜底：未命中静态资源时回退至 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
