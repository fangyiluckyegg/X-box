services:
  bibutong-front:
    build:
        context: ./web/bibutong_front
        dockerfile: Dockerfile.dev
    #image: nginx:1.25-alpine
    container_name: dev-bibutong-front
    ports:
      - "8081:80"
    mem_limit: 128m
    cpus: 0.2
    volumes:
      #- ./web/bibutong_front/dist:/usr/share/nginx/html
      - ./logs/bibutong-front:/var/log/nginx
    depends_on:
      - nginx-gateway
    networks:
      - dev-network

  bibutong-backend:
    build:
      context: .
      dockerfile: ./backend/bibutong_server/Dockerfile.dev
    container_name: dev-bibutong-backend
    mem_limit: 2g
    cpus: 2
    restart: no
    volumes:
      - ./logs/bibutong-backend:/app/logs
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: dev
      # 数据库配置
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bibutong_dev?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
      # Redis配置
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_DATABASE: 9
      # AI向量服务地址【给Java用的】
      AI_SERVICE_URL: http://llama:8000
    depends_on:
      - mysql
      - redis
      - llama
    networks:
      - dev-network

  llama:
    build:
      context: ./
      dockerfile: ./ai_llama/Dockerfile.llama
    container_name: dev-bibutong-llama
    mem_limit: 6g
    cpus: 2
    volumes:
      #- ./ai_llama:/model
      - ./ai_llama:/root/.ollama  # 模型挂载目录修正：官方镜像模型存在/root/.ollama
      - ./logs/llama:/app/logs
      - ./backend/bibutong_server/src/ai-infer:/app
    environment:
      MODEL_ROOT_PATH: /model
      TZ: Asia/Shanghai
      OLLAMA_HOST: 0.0.0.0  # 新增，允许外部容器访问
    ports:
      - "0.0.0.0:8000:8000"
      - "11434:11434" # 暴露ollama标准端口【给Python用的】
    # 只保留ollama原生启动命令，不再调用sh
    # 容器启动后后台起服务，自动下载模型，前台常驻运行
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "ollama serve & sleep 10; ollama pull bge-m3:latest; wait"

    networks:
      - dev-network

# 统一容器内网网络
networks:
  dev-network:
    driver: bridge

