# 服务器端口
server.port=8080

# 文件上传
# 文件大小设置已在UploadConfig中配置，也可在配置文件中配置
# 单个文件大小
spring.servlet.multipart.max-file-size=200MB
# 总文件大小（允许存储文件的文件夹大小)
spring.servlet.multipart.max-request-size=10240MB

# 文件上传的目标路径
# [P0-FIX] 路径环境变量化，移除硬编码Windows绝对路径
file.upload.path=${FILE_UPLOAD_PATH:./uploadTemp/}

# 文件上传允许的类型
file.upload.allowType[0]=application/pdf
file.upload.allowType[1]=video/mp4
file.upload.allowType[2]=video/avi
file.upload.allowType[3]=video/quicktime
file.upload.allowType[4]=video/x-msvideo
file.upload.allowType[5]=video/mpeg
file.upload.allowType[6]=application/vnd.ms-excel
file.upload.allowType[7]=application/vnd.openxmlformats-officedocument.spreadsheetml.sheet

# 日志配置
logging.level.com.prj=WARN
logging.level.org.springframework.web=WARN

# 跨域配置
# [P0-FIX] 限制CORS允许的源地址，移除通配符"*"
# [BUGFIX] 补充 127.0.0.1 和无端口(=80) 版本，浏览器对默认端口省略端口号，Spring精确匹配
cors.allowed-origins=http://localhost:8080,http://localhost:80,http://localhost:8081,http://localhost,http://127.0.0.1:8080,http://127.0.0.1:80,http://127.0.0.1:8081,http://127.0.0.1
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# [P1-3-FIX] Boot 3 默认 PathPatternParser 对 ** 通配符更严格，部分场景下与
#   HandlerMappingIntrospector/MvcRequestMatcher 组合时抛 PatternParseException。
#   切回 AntPathMatcher 以保证安全规则匹配兼容性（功能等价，性能差异可忽略）。
spring.mvc.pathmatch.matching-strategy=ant_path_matcher