# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8080
  servlet:
    # 应用的访问路径
    context-path: /

# 日志配置
logging:
  level:
    com.prj: debug
    org.springframework: warn

# Spring配置
spring:
  # [P0-FIX] Spring Boot 2.6+ 默认禁止循环引用，PageHelper 存在自引用循环，需显式放行
  main:
    allow-circular-references: true
  application:
    name: hrmanager
    
  # [P1-FIX] 移除 spring.jpa 配置（JPA依赖已移除，0个@Entity/@Repository，仅MyBatis使用）
  datasource:
    driverClassName: com.mysql.cj.jdbc.Driver
    #数据源
    url: jdbc:mysql://mysql:3306/prj_dev?characterEncoding=utf8&useSSL=true&serverTimezone=GMT%2B8
    username: prj_user
    # [P0-FIX] DB密码环境变量化，生产环境必须通过SPRING_DATASOURCE_PASSWORD覆盖
    password: ${SPRING_DATASOURCE_PASSWORD:Prj@Dev789}
    # 初始连接数
    initialSize: 5
    # 最小连接池数量
    minIdle: 10
    # 最大连接池数量
    maxActive: 20
    # 配置获取连接等待超时的时间
    maxWait: 10000
    # [P0-FIX] Druid监控控制台认证配置，防止未授权访问
    druid:
      stat-view-servlet:
        enabled: true
        login-username: ${DRUID_USERNAME:druid_admin}
        login-password: ${DRUID_PASSWORD:Druid@Dev2024}
 
  # redis 配置
  redis:
    # 地址s
    host: redis
    # 端口，默认为6379
    port: 6379
    # [P0-FIX] Redis认证密码，生产环境必须通过REDIS_PASSWORD环境变量覆盖
    password: ${REDIS_PASSWORD:redis_default_pass_change_me}
  # [P1-FIX] 移除 spring.cloud.nacos 和 ribbon 配置（Spring Cloud 依赖已移除，单体架构无需服务发现与负载均衡）

# token配置
token:
    # token自定义标识
    header: Authorization
    # [P0-FIX] JWT密钥环境变量化，生产环境必须通过JWT_SECRET设置至少256位强密钥
    secret: ${JWT_SECRET:please-set-a-strong-secret-key-at-least-256-bits}
    # 有效期
    expireTime: 30
  
# MyBatis配置
mybatis:
    # 搜索指定包别名
    typeAliasesPackage: com.prj.**.domain
    # 配置mapper的扫描，找到所有的mapper.xml映射文件
    mapperLocations: classpath*:mapper/**/*Mapper.xml

# PageHelper分页插件
pagehelper: 
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql 

# [P1-FIX] springdoc-openapi 配置（替代 Springfox）
springdoc:
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
