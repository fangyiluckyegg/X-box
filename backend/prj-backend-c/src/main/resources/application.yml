# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8080
  servlet:
    # 应用的访问路径
    context-path: /

# 日志配置
logging:
  level:
    com.prj: debug
    org.springframework: warn

# Spring配置
spring:
  application:
    name: hrmanager
    
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
  datasource:
    driverClassName: com.mysql.cj.jdbc.Driver
    #数据源
    url: jdbc:mysql://mysql:3306/prj_dev?characterEncoding=utf8&useSSL=true&serverTimezone=GMT%2B8
    username: prj_user
    password: Prj@Dev789
    # 初始连接数
    initialSize: 5
    # 最小连接池数量
    minIdle: 10
    # 最大连接池数量
    maxActive: 20
    # 配置获取连接等待超时的时间
    maxWait: 10000
 
  # redis 配置
  redis:
    # 地址s
    host: redis
    # 端口，默认为6379
    port: 6379
  # sentinel控制台的工作地址和端口
  cloud:
    nacos:
      discovery:
        #server-addr: 127.0.0.1:8858,127.0.0.1:8868
        server-addr: nacos:8858,nacos:8868
        #暂时不用nacos!关闭当前单体服务向 Nacos 注册实例，不再发起 TCP 连接，Connection refused 报错直接消失
        register-enabled: false

# 负载均衡
ribbon:
  NFLoadBalancerRuleClassName: com.netflix.loadbalancer.RoundRibbonRule

# token配置
token:
    # token自定义标识
    header: Authorization
    # 密钥
    secret: springbootVue123
    # 有效期
    expireTime: 30
  
# MyBatis配置
mybatis:
    # 搜索指定包别名
    typeAliasesPackage: com.prj.**.domain
    # 配置mapper的扫描，找到所有的mapper.xml映射文件
    mapperLocations: classpath*:mapper/**/*Mapper.xml

# PageHelper分页插件
pagehelper: 
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql 
