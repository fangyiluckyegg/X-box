# 开发环境配置
#
# ============================================================
# AI 向量服务（Ollama）环境变量契约 —— 仅记录约束，不写死值
# ------------------------------------------------------------
# AI_SERVICE_URL : 后端经此调 Ollama /api/embed（基础地址，自动拼接 /api/embed）。
#                   由 docker-compose 的 environment 注入；开发/生产均为
#                   http://host.docker.internal:11434（宿主原生 Ollama）。
#                   缺省值 http://dev-prj-llama:11434（CompareController @Value 兜底，仅历史兼容）。
# AI_EMBED_MODEL : 向量化模型名，缺省 bge-m3:latest（须与宿主 ollama pull 的模型一致）。
# AI_API_TOKEN   : 预留纵深防御占位，当前后端 Java 代码不消费（Ollama 默认无鉴权）。
# ============================================================
server:
  # 服务器的HTTP端口，默认为8080
  port: 8080
  servlet:
    # 应用的访问路径
    context-path: /
  # [C12] 信任前置 Nginx 转发的 X-Forwarded-For / X-Real-IP，使容器内获取真实客户端 IP。
  # 仅部署在 Nginx 单跳内网时启用，避免 IP 伪造。
  forward-headers-strategy: native

# 日志配置
logging:
  level:
    com.prj: debug
    org.springframework: warn

# Spring配置
spring:
  # [P0-FIX] Spring Boot 2.6+ 默认禁止循环引用，PageHelper 存在自引用循环，需显式放行
  main:
    allow-circular-references: true
  application:
    name: hrmanager
    
  # [P1-FIX] 移除 spring.jpa 配置（JPA依赖已移除，0个@Entity/@Repository，仅MyBatis使用）
  datasource:
    driverClassName: com.mysql.cj.jdbc.Driver
    #数据源
    url: jdbc:mysql://mysql:3306/prj_dev?characterEncoding=utf8mb4&useSSL=true&serverTimezone=GMT%2B8
    username: prj_user
    # [P0-FIX] DB密码环境变量化，生产环境必须通过SPRING_DATASOURCE_PASSWORD覆盖
    password: ${SPRING_DATASOURCE_PASSWORD:Prj@Dev789}
    # 初始连接数
    initialSize: 5
    # 最小连接池数量
    minIdle: 10
    # 最大连接池数量
    maxActive: 20
    # 配置获取连接等待超时的时间
    maxWait: 10000
    # [P0-FIX] Druid监控控制台认证配置，防止未授权访问
    druid:
      stat-view-servlet:
        enabled: true
        login-username: ${DRUID_USERNAME:druid_admin}
        login-password: ${DRUID_PASSWORD:Druid@Dev2024}
 
  # [P1-UPGRADE] Spring Boot 3 / Spring Data Redis 3：redis 配置前缀由 spring.redis.* 改为 spring.data.redis.*
  data:
    redis:
      # 地址
      host: redis
      # 端口，默认为6379
      port: 6379
      # [P0-FIX] Redis认证密码，生产环境必须通过REDIS_PASSWORD环境变量覆盖(对应 spring.data.redis.password)
      password: ${REDIS_PASSWORD:redis_default_pass_change_me}
      # [P0-FIX] Redis库索引，对应 spring.data.redis.database
      database: 9
  # [P1-FIX] 移除 spring.cloud.nacos 和 ribbon 配置（Spring Cloud 依赖已移除，单体架构无需服务发现与负载均衡）

# token配置
token:
    # token自定义标识
    header: Authorization
    # [P0-FIX] JWT密钥环境变量化，生产环境必须通过JWT_SECRET设置至少256位强密钥
    secret: ${JWT_SECRET:please-set-a-strong-secret-key-at-least-256-bits}
    # 有效期
    expireTime: 30
  
# MyBatis配置
mybatis:
    # 搜索指定包别名
    typeAliasesPackage: com.prj.**.domain
    # 配置mapper的扫描，找到所有的mapper.xml映射文件
    mapperLocations: classpath*:mapper/**/*Mapper.xml

# PageHelper分页插件
pagehelper: 
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql 

# [P1-FIX] springdoc-openapi 配置（替代 Springfox）
springdoc:
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
