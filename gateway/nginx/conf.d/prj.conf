server {
    listen 80 default_server;
    # server_name localhost 127.0.0.1 local.prj.com;

    server_name local.prj.com 127.0.0.1 localhost;
    # 移除 localhost、127.0.0.1，避免和default冲突
    # 其余转发、ssl配置不变

    # Docker内置DNS，延迟解析，规避启动校验报错
    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 10s;

    # 前端静态资源代理到前端服务
    location / {
        set $front_host prj-frontend;
        proxy_pass http://$front_host:8081;
        proxy_set_header Host $front_host;
        proxy_set_header X-Real-IP $remote_addr;
        expires -1;
    }

    # 后端 API 接口路由
    location /api/ {
        set $backend_host prj-backend-c;
        proxy_pass http://$backend_host:8080/api/;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods GET,POST,PUT,DELETE,OPTIONS always;
        if ($request_method = 'OPTIONS') { return 204; }
    }

    # AI 向量接口转发
    location /ai/vector/ {
        set $llama_host llama;
        proxy_pass http://$llama_host:8000/vector/;
        proxy_set_header Host $llama_host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}