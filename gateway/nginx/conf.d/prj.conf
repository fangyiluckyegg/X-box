# ============================================================
# PRJ 网关配置（C6 安全头 / C7 路由契约）
#
# ⚠️【仅限内网部署声明】当前无 TLS 证书，本配置以 HTTP(80) 对内网提供服务。
#    严禁将 80 端口直接暴露到公网。如要公网暴露，必须启用下方"预留 TLS server 块"
#    并配置证书（gateway/nginx/ssl/prj.crt、prj.key），否则存在中间人风险。
# ============================================================

server {
    listen 80 default_server;
    # server_name localhost 127.0.0.1 local.prj.com;

    server_name local.prj.com 127.0.0.1 localhost;
    # 移除 localhost、127.0.0.1，避免和default冲突
    # 其余转发、ssl配置不变

    # [C6] 安全响应头（内网 HTTP 场景）
    # 防点击劫持
    add_header X-Frame-Options "SAMEORIGIN" always;
    # 防 MIME 嗅探
    add_header X-Content-Type-Options "nosniff" always;
    # 旧浏览器 XSS 防护（现代浏览器已弃用，保留为纵深防御）
    add_header X-XSS-Protection "1; mode=block" always;
    # 限制 Referer 泄露
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # 内容安全策略（按实际前端域名收紧；AI 调用经后端代理，浏览器仅需同源）
    # 内容安全策略（dev 允许 unsafe-eval 以兼容 Vite/Webpack HMR；
    #   prod 应通过独立配置或 overlay 覆盖为严格模式，移除 unsafe-eval）
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' http://127.0.0.1:* https://127.0.0.1:* http://localhost:* https://localhost:* ws://127.0.0.1:* wss:;" always;
    # HSTS：仅在启用 HTTPS（下方 443 块）时取消注释
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Docker内置DNS，延迟解析，规避启动校验报错
    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 10s;

    # 前端静态资源代理到前端服务
    location / {
        set $front_host prj-frontend;
        proxy_pass http://$front_host:8081;
        proxy_set_header Host $front_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires -1;
    }

    # 登录、登出、验证码等直接转发到后端（避免前端静态路由拦截导致 403）
    location ~ ^/(login|logout|captchaImage) {
        set $backend_host prj-backend-c;
        proxy_pass http://$backend_host:8080;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        # [P1-10-FIX] CORS 交由后端 CorsFilter 统一处理，nginx 不再设置通配符
        if ($request_method = 'OPTIONS') { return 204; }
    }

    # [C7] 后端根路径 allowlist：显式转发到后端，不改控制器、不改前端。
    # 覆盖 /employee_kpi、/compare、/positionLearning、/druid 等业务根路径，
    # 以及文档/监控端点。放置于 location / 之前，正则匹配优先于前缀匹配。
    location ~ ^/(employee_kpi|compare|positionLearning|druid|v3|swagger-ui|doc.html|webjars|profile) {
        set $backend_host prj-backend-c;
        proxy_pass http://$backend_host:8080;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        if ($request_method = 'OPTIONS') { return 204; }
    }

    # 后端 API 接口路由
    location /api/ {
        set $backend_host prj-backend-c;
        # 不在 proxy_pass 中重复指定 URI，保留原始请求路径以避免路径被替换或截断
        proxy_pass http://$backend_host:8080;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        # [P1-10-FIX] CORS 交由后端 CorsFilter 统一处理，nginx 不再设置通配符
        if ($request_method = 'OPTIONS') { return 204; }
    }
}

