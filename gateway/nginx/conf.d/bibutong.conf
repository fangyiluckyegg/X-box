server {
    listen 80;
    server_name local.bibutong.com;

    # Docker内置DNS，延迟解析，规避启动校验报错
    resolver 127.0.0.11 valid=20s;
    resolver_timeout 10s;
    server {
        listen 80;
        server_name localhost 127.0.0.1 local.bibutong.com;
        # 临时静态返回，无反向代理，网关不会崩溃
        location / {
            return 200 "网关已正常启动，转发配置临时关闭调试";
    }

    # 前端静态资源转发
    location / {
        proxy_pass http://bibutong-front;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # 开发环境禁用静态缓存
        expires -1;
    }
  
    # 后端API接口路由
    location /api/ {
        proxy_pass http://bibutong-backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # 开发全局跨域
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods GET,POST,PUT,DELETE,OPTIONS;
    }

    # AI向量接口转发
    location /ai/vector/ {
        proxy_pass http://llama:8000/vector/;
        proxy_set_header Host $host;
    }


    # 前端静态资源转发
    location / {
        set $front_host bibutong-front;
        proxy_pass http://$front_host;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires -1;
        # SPA单页应用刷新路由兜底，解决403/404
        try_files $uri $uri/ /index.html;
    }

}