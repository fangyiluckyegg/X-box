# ============================================================
# PRJ 网关配置 · DEV 覆盖版
# ============================================================
# 唯一差异：在 script-src 增加 'unsafe-eval'，以放行 webpack-dev-server
# 在 vue-cli HMR 中使用的 eval()（chunk-vendors.js:4840）。
#
# 适用场景：开发栈经 nginx-gateway(80/443) 代理访问 prj-frontend:8081 时
# 浏览器 CSP 拦截 chunk-vendors.js 报错，导致页面停留在 loading 资源界面。
#
# 安全权衡：
#   - 仅 dev 端使用，prod 端继续用 gateway/nginx/conf.d/prj.conf（strict CSP）。
#   - 'unsafe-eval' 在 prod 构建产物中不需要（产物不含 eval），仍按 'self' 严格。
#   - dev 环境允许 eval 是 webpack-dev-server 设计的必然代价，业界通用做法。
#
# 加载机制：dev compose 单文件挂载覆盖
#   ./gateway/nginx/conf.d/dev/prj.conf:/etc/nginx/conf.d/prj.conf:ro
# 目录挂载 ./gateway/nginx/conf.d → /etc/nginx/conf.d 仍由 base 提供，
# 但本文件位于子目录 dev/，nginx 主配置 include /etc/nginx/conf.d/*.conf
# 不会递归到子目录，因此不会被重复加载（避免与覆盖后的 prj.conf 冲突 listen）。
# ============================================================

server {
    listen 80 default_server;
    # server_name localhost 127.0.0.1 local.prj.com;

    server_name local.prj.com 127.0.0.1 localhost;
    # 移除 localhost、127.0.0.1，避免和default冲突
    # 其余转发、ssl配置不变

    # [C6] 安全响应头（内网 HTTP 场景）
    # 防点击劫持
    add_header X-Frame-Options "SAMEORIGIN" always;
    # 防 MIME 嗅探
    add_header X-Content-Type-Options "nosniff" always;
    # 旧浏览器 XSS 防护（现代浏览器已弃用，保留为纵深防御）
    add_header X-XSS-Protection "1; mode=block" always;
    # 限制 Referer 泄露
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # 内容安全策略 · DEV 放宽版：script-src 增 'unsafe-eval' 放行 vue-cli HMR 的 eval()
    add_header Content-Security-Policy "default-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http:; font-src 'self' data:; connect-src 'self' http: https: ws: wss:" always;
    # HSTS：仅在启用 HTTPS（下方 443 块）时取消注释
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Docker内置DNS，延迟解析，规避启动校验报错
    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 10s;

    # 前端静态资源代理到前端服务
    location / {
        set $front_host prj-frontend;
        proxy_pass http://$front_host:8081;
        proxy_set_header Host $front_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires -1;
    }

    # 登录、登出、验证码等直接转发到后端（避免前端静态路由拦截导致 403）
    location ~ ^/(login|logout|captchaImage) {
        set $backend_host prj-backend-c;
        proxy_pass http://$backend_host:8080;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        # [P1-10-FIX] CORS 交由后端 CorsFilter 统一处理，nginx 不再设置通配符
        if ($request_method = 'OPTIONS') { return 204; }
    }

    # [C7] 后端根路径 allowlist：显式转发到后端，不改控制器、不改前端。
    # 覆盖 /employee_kpi、/compare、/positionLearning、/druid 等业务根路径，
    # 以及文档/监控端点。放置于 location / 之前，正则匹配优先于前缀匹配。
    location ~ ^/(employee_kpi|compare|positionLearning|druid|v3|swagger-ui|doc.html|webjars|profile) {
        set $backend_host prj-backend-c;
        proxy_pass http://$backend_host:8080;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        if ($request_method = 'OPTIONS') { return 204; }
    }

    # 后端 API 接口路由
    location /api/ {
        set $backend_host prj-backend-c;
        # 不在 proxy_pass 中重复指定 URI，保留原始请求路径以避免路径被替换或截断
        proxy_pass http://$backend_host:8080;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        # [P1-10-FIX] CORS 交由后端 CorsFilter 统一处理，nginx 不再设置通配符
        if ($request_method = 'OPTIONS') { return 204; }
    }

    # [Niu_Txl] 班级网站 607/902 经网关统一入口（Apache docroot=/var/www/html，607/902 为其子目录）
    # 保留原始 URI 转发（proxy_pass 末尾不带 /），使 /607/xxx 落到 prj-php:/var/www/html/607/xxx
    location ^~ /607/ {
        proxy_pass http://prj-php:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /902/ {
        proxy_pass http://prj-php:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ============================================================
# [C6] TLS server 块（已启用，dev 自签证书）
# 证书：gateway/nginx/ssl/prj.crt、prj.key（10 年有效期自签，端口仅绑本地 127.0.0.1:443）
# 最小风险策略：不强制 301 跳转、HSTS 保持注释；HTTP(80) 与 HTTPS(443) 对等共存。
# 生产替换：仅需替换 prj.crt / prj.key 两文件，本配置无需再改。
# ============================================================
server {
    listen 443 ssl default_server;
    server_name local.prj.com 127.0.0.1 localhost;

    ssl_certificate     /etc/nginx/ssl/prj.crt;
    ssl_certificate_key /etc/nginx/ssl/prj.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # HSTS：保持注释——不强制 301，避免 HSTS 锁死 http 客户端（dev 最小风险策略）
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # [C6] 安全响应头（HTTPS 场景；与 80 块对齐，CSP 同 80 块 DEV 放宽版）
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http:; font-src 'self' data:; connect-src 'self' http: https: ws: wss:" always;

    # Docker内置DNS，延迟解析，规避启动校验报错
    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 10s;

    # 前端静态资源代理到前端服务
    location / {
        set $front_host prj-frontend;
        proxy_pass http://$front_host:8081;
        proxy_set_header Host $front_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires -1;
    }

    # 登录、登出、验证码等直接转发到后端（避免前端静态路由拦截导致 403）
    location ~ ^/(login|logout|captchaImage) {
        set $backend_host prj-backend-c;
        proxy_pass http://$backend_host:8080;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        if ($request_method = 'OPTIONS') { return 204; }
    }

    # [C7] 后端根路径 allowlist：显式转发到后端，不改控制器、不改前端。
    # 覆盖 /employee_kpi、/compare、/positionLearning、/druid 等业务根路径，
    # 以及文档/监控端点。放置于 location / 之前，正则匹配优先于前缀匹配。
    location ~ ^/(employee_kpi|compare|positionLearning|druid|v3|swagger-ui|doc.html|webjars|profile) {
        set $backend_host prj-backend-c;
        proxy_pass http://$backend_host:8080;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        if ($request_method = 'OPTIONS') { return 204; }
    }

    # 后端 API 接口路由
    location /api/ {
        set $backend_host prj-backend-c;
        proxy_pass http://$backend_host:8080;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        if ($request_method = 'OPTIONS') { return 204; }
    }

    # [Niu_Txl] 班级网站 607/902 经网关统一入口（Apache docroot=/var/www/html，607/902 为其子目录）
    # 保留原始 URI 转发（proxy_pass 末尾不带 /），使 /607/xxx 落到 prj-php:/var/www/html/607/xxx
    location ^~ /607/ {
        proxy_pass http://prj-php:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /902/ {
        proxy_pass http://prj-php:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
