services:
  bibutong-front:
    build:
      context: ./web/bibutong_front
      dockerfile: Dockerfile.dev
    container_name: dev-bibutong-front
    ports:
      - "8081:8080"
    mem_limit: 1g
    cpus: 0.5
    volumes:
      # 源码挂载，不覆盖容器内node_modules
      - ./web/bibutong_front:/app:cached
      # 关键：单独挂载空卷屏蔽node_modules，保留容器内安装的依赖
      - node_modules_volume:/app/node_modules
      - ./logs/bibutong-front:/var/log/nginx
    networks:
      - dev-network

  bibutong-backend:
    env_file:
      - .env.dev
    build:
      context: .
      dockerfile: ./backend/bibutong_server/Dockerfile.dev
    container_name: dev-bibutong-backend
    mem_limit: 2g
    cpus: 2
    restart: "no"
    working_dir: /workspace/backend/bibutong_server
    # 修复 TTY /dev/tty 缺失报错（VSCode DevContainer 必须）
    stdin_open: true
    tty: true
    # 覆盖默认启动命令，开发环境直接maven启动源码，不依赖jar包
    #command: ["mvn", "spring-boot:run"]

    volumes:
      # 全项目挂载，适配DevContainer /workspace
      - ./:/workspace:cached
      # Maven缓存卷，避免重复下载依赖
      - maven-cache:/root/.m2
      - ./logs/bibutong-backend:/app/logs
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: dev
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bibutong_dev?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_DATABASE: 9
      AI_SERVICE_URL: http://llama:8000
    ports:
      - "8080:8080"
      - "5005:5005"
    depends_on:
      - mysql
      - redis
      - llama
    networks:
      - dev-network

  llama:
    build:
      context: ./
      dockerfile: ./ai_llama/Dockerfile.llama
    container_name: dev-bibutong-llama
    mem_limit: 6g
    cpus: 2
    # Ollama TUI工具需要终端设备，修复 /dev/tty 报错
    stdin_open: true
    tty: true
    volumes:
      # Ollama官方模型持久化目录
      - ./ai_llama:/root/.ollama
      - ./logs/llama:/app/logs
    environment:
      MODEL_ROOT_PATH: /model
      TZ: Asia/Shanghai
      OLLAMA_HOST: 0.0.0.0
    ports:
      - "8000:8000"
      - "11434:11434"
    entrypoint: ["/bin/sh", "-c"]
    command: >
      ollama serve &
      until ollama list; do sleep 1; done;
      ollama pull bge-m3:latest;
      wait
    networks:
      - dev-network

# 开发内网桥接网络
networks:
  dev-network:
    driver: bridge

# Maven持久化缓存卷，加速编译
volumes:
  maven-cache:
  # 文件末尾新增命名卷
  node_modules_volume:
